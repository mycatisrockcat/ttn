<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일기 캘린더</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff; --bg2: #f7f9f9; --bg3: #e8f5fe;
    --border: #eff3f4; --border2: #cfd9de;
    --text: #0f1419; --text2: #536471; --text3: #8b98a5;
    --blue: #1d9bf0; --blue-light: #e8f5fe;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#000; --bg2:#16181c; --bg3:#1a2733;
      --border:#2f3336; --border2:#3e4144;
      --text:#e7e9ea; --text2:#71767b; --text3:#555f67;
      --blue-light:#1a2733;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }
  .wrap { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* ── 헤더 ── */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .cal-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .nav-btns { display: flex; gap: 6px; }
  .nav-btn { background: none; border: 0.5px solid var(--border2); border-radius: 8px; padding: 6px 10px; cursor: pointer; color: var(--text2); font-size: 16px; display: flex; align-items: center; }
  .nav-btn:hover { background: var(--bg2); }
  .today-btn { font-size: 13px; padding: 6px 14px; font-family: inherit; }

  /* ── 캘린더 그리드 ── */
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
  .weekday { text-align: center; font-size: 12px; font-weight: 600; color: var(--text3); padding: 4px 0; }
  .weekday:first-child { color: #f4212e; }
  .weekday:last-child  { color: var(--blue); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .day-cell { min-height: 72px; border-radius: 10px; padding: 6px 7px; cursor: pointer; border: 0.5px solid transparent; transition: background 0.12s, border-color 0.12s; position: relative; }
  .day-cell:hover { background: var(--bg2); border-color: var(--border2); }
  .day-cell.other-month { opacity: 0.3; pointer-events: none; }
  .day-cell.today .day-num { background: var(--blue); color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .day-cell.selected { background: var(--blue-light); border-color: var(--blue); }
  .day-cell.has-entry { background: var(--bg2); }
  .day-cell.has-entry:hover { border-color: var(--blue); }

  .day-num { font-size: 13px; font-weight: 500; color: var(--text); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
  .day-cell.sun .day-num { color: #f4212e; }
  .day-cell.sat .day-num { color: var(--blue); }
  .day-cell.today .day-num { color: #fff; }

  .day-preview { font-size: 11px; color: var(--text3); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); position: absolute; top: 7px; right: 8px; }

  /* ── 상세 패널 ── */
  .detail-panel { margin-top: 1.25rem; border: 0.5px solid var(--border2); border-radius: var(--radius); overflow: hidden; }
  .detail-header { padding: 0.9rem 1.25rem; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .detail-date { font-size: 15px; font-weight: 700; color: var(--text); }
  .detail-count { font-size: 13px; color: var(--text3); }
  .detail-empty { padding: 2.5rem 1rem; text-align: center; color: var(--text3); font-size: 14px; }

  /* ── 게시물 ── */
  .entries { display: flex; flex-direction: column; }
  .entry { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 1rem 1.25rem; display: flex; gap: 12px; }
  .entry:last-child { border-bottom: none; }
  .e-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; font-size: 16px; font-weight: 600; color: #fff; }
  .e-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .e-body { flex: 1; min-width: 0; }
  .e-header { display: flex; align-items: baseline; gap: 5px; margin-bottom: 3px; flex-wrap: wrap; }
  .e-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .e-uid  { font-size: 13px; color: var(--text3); }
  .e-time { font-size: 12px; color: var(--text3); }
  .e-text { font-size: 14px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .e-photos { display: grid; gap: 3px; border-radius: 10px; overflow: hidden; margin-top: 8px; }
  .e-photos.n1 { grid-template-columns: 1fr; }
  .e-photos.n2 { grid-template-columns: 1fr 1fr; }
  .e-photos.n3 { grid-template-columns: 1fr 1fr; }
  .e-photos.n4 { grid-template-columns: 1fr 1fr; }
  .e-photos.n1 .eslot { height: 180px; }
  .e-photos.n2 .eslot { height: 130px; }
  .e-photos.n3 .eslot { height: 110px; }
  .e-photos.n3 .eslot:first-child { grid-column:1/-1; height: 140px; }
  .e-photos.n4 .eslot { height: 110px; }
  .eslot { overflow: hidden; }
  .eslot img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ── 통계 바 ── */
  .stats { display: flex; gap: 16px; margin-bottom: 1.25rem; padding: 0.9rem 1.25rem; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); }
  .stat { text-align: center; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--blue); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 통계 -->
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">총 기록 일수</div></div>
    <div class="stat"><div class="stat-num" id="stat-month">0</div><div class="stat-label">이번 달 기록</div></div>
    <div class="stat"><div class="stat-num" id="stat-posts">0</div><div class="stat-label">총 게시물</div></div>
  </div>

  <!-- 캘린더 헤더 -->
  <div class="cal-header">
    <div class="cal-title" id="cal-title"></div>
    <div class="nav-btns">
      <button class="nav-btn today-btn" id="btn-today">오늘</button>
      <button class="nav-btn" id="btn-prev"><i class="ti ti-chevron-left"></i></button>
      <button class="nav-btn" id="btn-next"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <!-- 요일 헤더 -->
  <div class="weekdays">
    <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
    <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div>
    <div class="weekday">토</div>
  </div>

  <!-- 달력 그리드 -->
  <div class="cal-grid" id="cal-grid"></div>

  <!-- 날짜 클릭 시 상세 -->
  <div class="detail-panel" id="detail-panel" style="display:none;">
    <div class="detail-header">
      <span class="detail-date" id="detail-date"></span>
      <span class="detail-count" id="detail-count"></span>
    </div>
    <div id="detail-body"></div>
  </div>

</div>
<script>
  let curYear, curMonth, selectedDate = null;

  function toYMD(y, m, d) {
    return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0');
  }
  function getEntries(dateStr) {
    try { return JSON.parse(localStorage.getItem('diary_' + dateStr) || '[]'); } catch(e) { return []; }
  }
  function fmtTime(s) {
    if (!s) return '';
    const [h,m] = s.split(':').map(Number);
    return `${h<12?'오전':'오후'} ${h===0?12:h>12?h-12:h}:${String(m).padStart(2,'0')}`;
  }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // localStorage에서 diary_ 로 시작하는 키 전부 수집
  function getAllDiaryKeys() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('diary_') && k !== 'diary_profile' && k !== 'diary_default') {
        keys.push(k.replace('diary_', ''));
      }
    }
    return keys;
  }

  function updateStats() {
    const allKeys = getAllDiaryKeys();
    const now = new Date();
    const thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    let totalPosts = 0;
    let monthDays = 0;
    allKeys.forEach(k => {
      const entries = getEntries(k);
      if (entries.length > 0) {
        totalPosts += entries.length;
        if (k.startsWith(thisMonth)) monthDays++;
      }
    });
    document.getElementById('stat-total').textContent = allKeys.filter(k => getEntries(k).length > 0).length;
    document.getElementById('stat-month').textContent = monthDays;
    document.getElementById('stat-posts').textContent = totalPosts;
  }

  function renderCalendar(year, month) {
    curYear = year; curMonth = month;
    document.getElementById('cal-title').textContent = year + '년 ' + month + '월';

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    const firstDay = new Date(year, month - 1, 1).getDay();
    const lastDate = new Date(year, month, 0).getDate();
    const prevLastDate = new Date(year, month - 1, 0).getDate();
    const today = new Date();
    const todayStr = toYMD(today.getFullYear(), today.getMonth()+1, today.getDate());

    // 이전 달 빈칸
    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      const num = prevLastDate - firstDay + 1 + i;
      cell.innerHTML = `<div class="day-num">${num}</div>`;
      grid.appendChild(cell);
    }

    // 이번 달
    for (let d = 1; d <= lastDate; d++) {
      const dateStr = toYMD(year, month, d);
      const entries = getEntries(dateStr);
      const dow = new Date(year, month-1, d).getDay();
      const cell = document.createElement('div');

      const classes = ['day-cell'];
      if (dow === 0) classes.push('sun');
      if (dow === 6) classes.push('sat');
      if (dateStr === todayStr) classes.push('today');
      if (entries.length > 0) classes.push('has-entry');
      if (dateStr === selectedDate) classes.push('selected');
      cell.className = classes.join(' ');
      cell.dataset.date = dateStr;

      // 미리보기 텍스트 (첫 게시물 첫 줄)
      let previewHtml = '';
      if (entries.length > 0) {
        const firstText = [...entries].reverse()[0].text || '';
        const preview = firstText.split('\n')[0].slice(0, 30);
        previewHtml = `<div class="day-preview">${esc(preview)}</div>`;
        cell.innerHTML = `<div class="day-num">${d}</div><div class="day-dot"></div>${previewHtml}`;
      } else {
        cell.innerHTML = `<div class="day-num">${d}</div>`;
      }

      cell.addEventListener('click', () => selectDate(dateStr));
      grid.appendChild(cell);
    }

    // 다음 달 빈칸
    const totalCells = firstDay + lastDate;
    const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= remaining; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      cell.innerHTML = `<div class="day-num">${i}</div>`;
      grid.appendChild(cell);
    }
  }

  function selectDate(dateStr) {
    selectedDate = dateStr;
    // 선택 표시 업데이트
    document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
    const target = document.querySelector(`.day-cell[data-date="${dateStr}"]`);
    if (target) target.classList.add('selected');

    const entries = getEntries(dateStr);
    const panel = document.getElementById('detail-panel');
    const body = document.getElementById('detail-body');
    const dateLabel = document.getElementById('detail-date');
    const countLabel = document.getElementById('detail-count');

    const d = new Date(dateStr + 'T00:00:00');
    dateLabel.textContent = d.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
    countLabel.textContent = entries.length > 0 ? `게시물 ${entries.length}개` : '';

    panel.style.display = '';

    if (!entries.length) {
      body.innerHTML = '<div class="detail-empty">이날은 기록이 없어요.</div>';
      return;
    }

    body.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'entries';

    // 시간순 정렬 (오래된 것부터)
    const sorted = [...entries].reverse();
    sorted.forEach(e => {
      const div = document.createElement('div');
      div.className = 'entry';
      const avatarInner = e.profilePhoto
        ? `<img src="${e.profilePhoto}" alt="프로필">`
        : (e.name ? e.name.charAt(0).toUpperCase() : '<i class="ti ti-user" style="font-size:17px;color:#fff;"></i>');
      div.innerHTML = `
        <div class="e-avatar">${avatarInner}</div>
        <div class="e-body">
          <div class="e-header">
            ${e.name ? `<span class="e-name">${esc(e.name)}</span>` : ''}
            ${e.uid  ? `<span class="e-uid">${esc(e.uid)}</span>`   : ''}
            <span class="e-time">· ${fmtTime(e.timeStr || '')}</span>
          </div>
          ${e.text ? `<p class="e-text">${esc(e.text)}</p>` : ''}
          ${e.photos && e.photos.length ? `<div class="photos-ph"></div>` : ''}
        </div>`;
      list.appendChild(div);

      if (e.photos && e.photos.length) {
        const ph = div.querySelector('.photos-ph');
        const grid = document.createElement('div');
        grid.className = 'e-photos n' + e.photos.length;
        e.photos.forEach(src => {
          const slot = document.createElement('div'); slot.className = 'eslot';
          const img = document.createElement('img'); img.src = src;
          slot.appendChild(img); grid.appendChild(slot);
        });
        ph.replaceWith(grid);
      }
    });

    body.appendChild(list);

    // 패널로 스크롤
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // 네비게이션
  document.getElementById('btn-prev').addEventListener('click', () => {
    curMonth--;
    if (curMonth < 1) { curMonth = 12; curYear--; }
    renderCalendar(curYear, curMonth);
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    curMonth++;
    if (curMonth > 12) { curMonth = 1; curYear++; }
    renderCalendar(curYear, curMonth);
  });
  document.getElementById('btn-today').addEventListener('click', () => {
    const now = new Date();
    renderCalendar(now.getFullYear(), now.getMonth()+1);
    const todayStr = toYMD(now.getFullYear(), now.getMonth()+1, now.getDate());
    selectDate(todayStr);
  });

  // 초기 렌더
  const now = new Date();
  updateStats();
  renderCalendar(now.getFullYear(), now.getMonth()+1);

  // 오늘 날짜 자동 선택
  const todayStr = toYMD(now.getFullYear(), now.getMonth()+1, now.getDate());
  selectDate(todayStr);
</script>
</body>
</html>
