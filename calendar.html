<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일기 캘린더</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff; --bg2: #f7f9f9; --bg3: #e8f5fe;
    --border: #eff3f4; --border2: #cfd9de;
    --text: #0f1419; --text2: #536471; --text3: #8b98a5;
    --blue: #1d9bf0; --blue-light: #e8f5fe;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#000; --bg2:#16181c; --bg3:#1a2733;
      --border:#2f3336; --border2:#3e4144;
      --text:#e7e9ea; --text2:#71767b; --text3:#555f67;
      --blue-light:#1a2733;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }
  .wrap { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* 토큰 화면 */
  .token-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;text-align:center;}
  .token-screen h2{font-size:18px;font-weight:700;}
  .token-screen p{font-size:14px;color:var(--text2);line-height:1.6;max-width:400px;}
  .token-input{width:100%;max-width:420px;font-family:inherit;font-size:13px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;}
  .token-input:focus{border-color:var(--blue);}
  .token-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .token-btn:hover{background:#1a8cd8;}
  .main-screen{display:none;}

  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .cal-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .nav-btns { display: flex; gap: 6px; }
  .nav-btn { background: none; border: 0.5px solid var(--border2); border-radius: 8px; padding: 6px 10px; cursor: pointer; color: var(--text2); font-size: 16px; display: flex; align-items: center; }
  .nav-btn:hover { background: var(--bg2); }
  .today-btn { font-size: 13px; padding: 6px 14px; font-family: inherit; }

  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
  .weekday { text-align: center; font-size: 12px; font-weight: 600; color: var(--text3); padding: 4px 0; }
  .weekday:first-child { color: #f4212e; }
  .weekday:last-child  { color: var(--blue); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .day-cell { min-height: 72px; border-radius: 10px; padding: 6px 7px; cursor: pointer; border: 0.5px solid transparent; transition: background 0.12s, border-color 0.12s; position: relative; }
  .day-cell:hover { background: var(--bg2); border-color: var(--border2); }
  .day-cell.other-month { opacity: 0.3; pointer-events: none; }
  .day-cell.today .day-num { background: var(--blue); color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .day-cell.selected { background: var(--blue-light); border-color: var(--blue); }
  .day-cell.has-entry { background: var(--bg2); }
  .day-cell.has-entry:hover { border-color: var(--blue); }
  .day-cell.tag-dimmed { opacity: 0.25; }

  .day-num { font-size: 13px; font-weight: 500; color: var(--text); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
  .day-cell.sun .day-num { color: #f4212e; }
  .day-cell.sat .day-num { color: var(--blue); }
  .day-cell.today .day-num { color: #fff; }

  .day-preview { font-size: 11px; color: var(--text3); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .day-preview.has-memo { color: var(--blue); font-weight: 500; }
  .day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); position: absolute; top: 7px; right: 8px; }

  /* 태그 필터 */
  .tag-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .tag-chip { font-size: 12px; padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; }
  .tag-chip:hover { background: var(--bg2); }
  .tag-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* 날짜 메모 입력 */
  .memo-edit-row { display: flex; gap: 8px; align-items: center; margin-top: 0.5rem; }
  .memo-input { flex: 1; font-family: inherit; font-size: 13px; padding: 7px 12px; border: 0.5px solid var(--border2); border-radius: 8px; background: var(--bg2); color: var(--text); outline: none; }
  .memo-input:focus { border-color: var(--blue); }
  .memo-save-btn { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .memo-save-btn:hover { background: #1a8cd8; }

  .detail-panel { margin-top: 1.25rem; border: 0.5px solid var(--border2); border-radius: var(--radius); overflow: hidden; }
  .detail-header { padding: 0.9rem 1.25rem; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .detail-date { font-size: 15px; font-weight: 700; color: var(--text); }
  .detail-count { font-size: 13px; color: var(--text3); }
  .detail-empty { padding: 2.5rem 1rem; text-align: center; color: var(--text3); font-size: 14px; }

  .entries { display: flex; flex-direction: column; }
  .entry { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 1rem 1.25rem; display: flex; gap: 12px; }
  .entry:last-child { border-bottom: none; }
  .e-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; font-size: 16px; font-weight: 600; color: #fff; }
  .e-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .e-body { flex: 1; min-width: 0; }
  .e-header { display: flex; align-items: baseline; gap: 5px; margin-bottom: 3px; flex-wrap: wrap; }
  .e-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .e-uid  { font-size: 13px; color: var(--text3); }
  .e-time { font-size: 12px; color: var(--text3); }
  .e-text { font-size: 14px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .e-photos { display: grid; gap: 3px; border-radius: 10px; overflow: hidden; margin-top: 8px; }
  .e-photos.n1 { grid-template-columns: 1fr; }
  .e-photos.n2 { grid-template-columns: 1fr 1fr; }
  .e-photos.n3 { grid-template-columns: 1fr 1fr; }
  .e-photos.n4 { grid-template-columns: 1fr 1fr; }
  .e-photos.n1 .eslot { height: 180px; }
  .e-photos.n2 .eslot { height: 130px; }
  .e-photos.n3 .eslot { height: 110px; }
  .e-photos.n3 .eslot:first-child { grid-column:1/-1; height: 140px; }
  .e-photos.n4 .eslot { height: 110px; }
  .eslot { overflow: hidden; cursor: zoom-in; }
  .eslot img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .stats { display: flex; gap: 16px; margin-bottom: 1.25rem; padding: 0.9rem 1.25rem; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius); }
  .stat { text-align: center; flex: 1; }
  .stat-num { font-size: 20px; font-weight: 700; color: var(--blue); }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .sync-status { font-size: 12px; color: var(--text3); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .sync-dot.ok { background: #00ba7c; }
  .sync-dot.saving { background: #ffd400; animation: pulse 1s infinite; }
  .sync-dot.error { background: #f4212e; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s ease;}
  .lightbox.show{opacity:1;pointer-events:all;}
  .lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;}
  .lb-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px;}
  .lb-close:hover{background:rgba(255,255,255,0.25);}

  /* 섹션 구분 */
  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); padding: 0.9rem 1.25rem 0.5rem; display: flex; align-items: center; gap: 6px; }
  .section-title.dm { background: #fff5f8; }
  .day-dot.dm-dot { background: #ff8fb3; }
  .day-dots-wrap { display: flex; gap: 3px; position: absolute; top: 7px; right: 8px; }

  /* DM 미니 버블 (캘린더 상세용) */
  .dm-entry { background: var(--bg); padding: 0.5rem 1.25rem; display: flex; gap: 10px; }
  .dm-entry.me { flex-direction: row-reverse; }
  .dm-avatar { width: 34px; height: 34px; border-radius: 50%; background: #ff8fb3; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; color: #fff; font-size: 14px; }
  .dm-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .dm-content { max-width: 75%; display: flex; flex-direction: column; gap: 4px; }
  .dm-entry.me .dm-content { align-items: flex-end; }
  .dm-bubble { padding: 8px 12px; border-radius: 14px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
  .dm-entry:not(.me) .dm-bubble { background: #FFB8CC; color: #111; border-bottom-left-radius: 4px; }
  .dm-entry.me .dm-bubble { background: #EBE8E8; color: #111; border-bottom-right-radius: 4px; }
  .dm-bubble.photo { padding: 3px; background: transparent; }
  .dm-bubble.photo img { max-width: 160px; max-height: 200px; border-radius: 10px; display: block; cursor: zoom-in; object-fit: cover; }
  .dm-time { font-size: 10px; color: var(--text3); padding: 0 4px; }
</style>
</head>
<body>

<div class="wrap">
  <!-- 토큰 화면 -->
  <div class="token-screen" id="token-screen">
    <h2>🔑 GitHub 토큰 설정</h2>
    <p>일기 데이터를 불러오기 위해<br>Personal Access Token을 입력해주세요.</p>
    <input class="token-input" id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
    <button class="token-btn" id="token-btn">저장하고 시작하기</button>
  </div>

  <!-- 메인 -->
  <div class="main-screen" id="main-screen">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-msg">불러오는 중...</span>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">총 기록 일수</div></div>
      <div class="stat"><div class="stat-num" id="stat-month">0</div><div class="stat-label">이번 달 기록</div></div>
      <div class="stat"><div class="stat-num" id="stat-posts">0</div><div class="stat-label">총 게시물</div></div>
    </div>

    <div class="tag-filter-bar" id="tag-filter-bar"></div>

    <div class="cal-header">
      <div class="cal-title" id="cal-title"></div>
      <div class="nav-btns">
        <button class="nav-btn today-btn" id="btn-today">오늘</button>
        <button class="nav-btn" id="btn-prev"><i class="ti ti-chevron-left"></i></button>
        <button class="nav-btn" id="btn-next"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>

    <div class="weekdays">
      <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
      <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div>
      <div class="weekday">토</div>
    </div>

    <div class="cal-grid" id="cal-grid"></div>

    <div class="detail-panel" id="detail-panel" style="display:none;">
      <div class="detail-header">
        <span class="detail-date" id="detail-date"></span>
        <span class="detail-count" id="detail-count"></span>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close"><i class="ti ti-x"></i></button>
  <img id="lb-img" src="" alt="">
</div>

<script>
  const GITHUB_OWNER = 'mycatisrockcat';
  const GITHUB_REPO  = 'diary-data';
  const TOKEN_KEY = 'diary_github_token';

  let curYear, curMonth, selectedDate = null;
  let entriesCache = {}; // { '2025-06-16': [...] }

  function getToken(){ return localStorage.getItem(TOKEN_KEY) || ''; }
  function setToken(t){ localStorage.setItem(TOKEN_KEY, t); }

  document.getElementById('token-btn').addEventListener('click', async () => {
    const t = document.getElementById('token-input').value.trim();
    if (!t) { alert('토큰을 입력해주세요.'); return; }
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}`, { headers: { Authorization: `token ${t}` } });
      if (!res.ok) throw new Error();
      setToken(t);
      showMain();
    } catch(e) {
      alert('토큰이 올바르지 않거나 저장소에 접근할 수 없어요.');
    }
  });

  function showMain(){
    document.getElementById('token-screen').style.display='none';
    document.getElementById('main-screen').style.display='block';
    init();
  }

  function setSyncStatus(state,msg){
    document.getElementById('sync-dot').className='sync-dot '+state;
    document.getElementById('sync-msg').textContent=msg;
  }

  // ── GitHub API: data 폴더 전체 목록 가져오기 ──
  async function ghListDataFolder(){
    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/data`, {
      headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (res.status === 404) return [];
    if (!res.ok) throw new Error('목록 조회 실패');
    return res.json(); // [{name:'2025-06-16.json', ...}, ...]
  }

  async function ghGetFile(path){
    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
      headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!res.ok) return null;
    const data = await res.json();
    try {
      return JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,'')))));
    } catch(e) { return null; }
  }

  let dmCache = {}; // { '2025-06-16': [msg, msg, ...] }
  let dmSettings = null;
  let memoCache = {}; // { '2025-06-16': '메모 텍스트' }
  let memoSha = null;
  let activeTag = null; // 현재 선택된 태그 필터

  async function ghPutFile(path, content, sha){
    const body = { message: `calendar: ${path}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2)))) };
    if (sha) body.sha = sha;
    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
      method:'PUT',
      headers:{ Authorization:`token ${getToken()}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    if(!res.ok) throw new Error('저장 실패');
    return res.json();
  }

  async function ghGetFileWithSha(path){
    const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
      headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (res.status === 404) return null;
    if (!res.ok) return null;
    const data = await res.json();
    let parsed = null;
    try { parsed = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))))); } catch(e) { parsed = null; }
    return { sha: data.sha, content: parsed };
  }

  function extractTags(text){
    if(!text) return [];
    const matches = text.match(/#[^\s#]+/g);
    return matches ? [...new Set(matches.map(t=>t.slice(1)))] : [];
  }

  function getAllTags(){
    const tagSet = new Set();
    Object.values(entriesCache).forEach(dayEntries=>{
      dayEntries.forEach(e=>{
        const tags = e.tags && e.tags.length ? e.tags : extractTags(e.text);
        tags.forEach(t=>tagSet.add(t));
      });
    });
    return [...tagSet].sort();
  }

  function dayHasTag(dateStr, tag){
    const entries = getEntries(dateStr);
    return entries.some(e=>{
      const tags = e.tags && e.tags.length ? e.tags : extractTags(e.text);
      return tags.includes(tag);
    });
  }

  function renderTagFilterBar(){
    const bar = document.getElementById('tag-filter-bar');
    const tags = getAllTags();
    bar.innerHTML = '';
    if (!tags.length) return;
    const allChip = document.createElement('button');
    allChip.className = 'tag-chip' + (activeTag===null?' active':'');
    allChip.textContent = '전체';
    allChip.addEventListener('click', ()=>{ activeTag=null; renderTagFilterBar(); renderCalendar(curYear,curMonth); });
    bar.appendChild(allChip);
    tags.forEach(tag=>{
      const chip = document.createElement('button');
      chip.className = 'tag-chip' + (activeTag===tag?' active':'');
      chip.textContent = '#'+tag;
      chip.addEventListener('click', ()=>{ activeTag = (activeTag===tag?null:tag); renderTagFilterBar(); renderCalendar(curYear,curMonth); });
      bar.appendChild(chip);
    });
  }

  // 모든 날짜 데이터를 한 번에 로드 (일기 + 위버스 DM)
  async function loadAllEntries(){
    setSyncStatus('saving','전체 기록 불러오는 중...');
    try {
      const files = await ghListDataFolder();
      const jsonFiles = files.filter(f => f.name.endsWith('.json'));
      entriesCache = {};
      await Promise.all(jsonFiles.map(async f => {
        const date = f.name.replace('.json','');
        const data = await ghGetFile(`data/${f.name}`);
        if (data && Array.isArray(data) && data.length > 0) {
          entriesCache[date] = data;
        }
      }));

      // 위버스 DM 불러오기 + 날짜별 그룹핑
      dmCache = {};
      const dmMessages = await ghGetFile('weverse/messages.json');
      if (dmMessages && Array.isArray(dmMessages)) {
        dmMessages.forEach(m => {
          if (!dmCache[m.date]) dmCache[m.date] = [];
          dmCache[m.date].push(m);
        });
      }
      // 위버스 설정(이름/사진)은 localStorage에 있음 (같은 기기 기준)
      try {
        const settingsFile = await ghGetFile('weverse/settings.json');
        dmSettings = settingsFile || null;
      } catch(e) { dmSettings = null; }

      // 날짜별 캘린더 메모 불러오기
      const memoFile = await ghGetFileWithSha('calendar/memos.json');
      if (memoFile && memoFile.content) {
        memoCache = memoFile.content;
        memoSha = memoFile.sha;
      } else {
        memoCache = {};
        memoSha = null;
      }

      const totalDays = new Set([...Object.keys(entriesCache), ...Object.keys(dmCache)]).size;
      setSyncStatus('ok', `${totalDays}일 분량 불러옴`);
    } catch(e) {
      setSyncStatus('error','불러오기 실패 — 토큰/저장소를 확인하세요');
    }
  }

  async function saveMemo(dateStr, text){
    memoCache[dateStr] = text;
    if (!text) delete memoCache[dateStr];
    try {
      const res = await ghPutFile('calendar/memos.json', memoCache, memoSha);
      memoSha = res.content.sha;
    } catch(e) { /* 저장 실패 시 무시 */ }
  }

  function toYMD(y,m,d){ return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
  function getEntries(dateStr){ return entriesCache[dateStr] || []; }
  function fmtTime(s){ if(!s)return''; const [h,m]=s.split(':').map(Number); return `${h<12?'오전':'오후'} ${h===0?12:h>12?h-12:h}:${String(m).padStart(2,'0')}`; }
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function updateStats(){
    const allKeys = Object.keys(entriesCache);
    const now = new Date();
    const thisMonth = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
    let totalPosts = 0, monthDays = 0;
    allKeys.forEach(k => {
      const e = entriesCache[k];
      totalPosts += e.length;
      if (k.startsWith(thisMonth)) monthDays++;
    });
    document.getElementById('stat-total').textContent = allKeys.length;
    document.getElementById('stat-month').textContent = monthDays;
    document.getElementById('stat-posts').textContent = totalPosts;
  }

  function renderCalendar(year, month){
    curYear=year; curMonth=month;
    document.getElementById('cal-title').textContent = year+'년 '+month+'월';
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    const firstDay = new Date(year, month-1, 1).getDay();
    const lastDate = new Date(year, month, 0).getDate();
    const prevLastDate = new Date(year, month-1, 0).getDate();
    const today = new Date();
    const todayStr = toYMD(today.getFullYear(), today.getMonth()+1, today.getDate());

    for (let i=0;i<firstDay;i++){
      const cell=document.createElement('div'); cell.className='day-cell other-month';
      cell.innerHTML=`<div class="day-num">${prevLastDate-firstDay+1+i}</div>`;
      grid.appendChild(cell);
    }

    for (let d=1; d<=lastDate; d++){
      const dateStr = toYMD(year,month,d);
      const entries = getEntries(dateStr);
      const dms = dmCache[dateStr] || [];
      const hasAny = entries.length>0 || dms.length>0;
      const matchesTag = !activeTag || dayHasTag(dateStr, activeTag);
      const dow = new Date(year,month-1,d).getDay();
      const cell = document.createElement('div');
      const classes=['day-cell'];
      if(dow===0)classes.push('sun');
      if(dow===6)classes.push('sat');
      if(dateStr===todayStr)classes.push('today');
      if(hasAny)classes.push('has-entry');
      if(dateStr===selectedDate)classes.push('selected');
      if(activeTag && !matchesTag)classes.push('tag-dimmed');
      cell.className=classes.join(' ');
      cell.dataset.date=dateStr;

      let dotsHtml = '';
      if (entries.length>0) dotsHtml += '<div class="day-dot"></div>';
      if (dms.length>0) dotsHtml += '<div class="day-dot dm-dot"></div>';

      const memo = memoCache[dateStr];
      if (memo) {
        cell.innerHTML = `<div class="day-num">${d}</div><div class="day-dots-wrap">${dotsHtml}</div><div class="day-preview has-memo">${esc(memo)}</div>`;
      } else if (hasAny){
        const firstText = entries.length>0
          ? ([...entries].reverse()[0].text || '')
          : (dms[0].text || '📷 사진');
        const preview = firstText.split('\n')[0].slice(0,28);
        cell.innerHTML = `<div class="day-num">${d}</div><div class="day-dots-wrap">${dotsHtml}</div><div class="day-preview">${esc(preview)}</div>`;
      } else {
        cell.innerHTML = `<div class="day-num">${d}</div>`;
      }
      cell.addEventListener('click', () => selectDate(dateStr));
      grid.appendChild(cell);
    }

    const totalCells = firstDay+lastDate;
    const remaining = totalCells%7===0?0:7-(totalCells%7);
    for (let i=1;i<=remaining;i++){
      const cell=document.createElement('div'); cell.className='day-cell other-month';
      cell.innerHTML=`<div class="day-num">${i}</div>`;
      grid.appendChild(cell);
    }
  }

  function selectDate(dateStr){
    selectedDate = dateStr;
    document.querySelectorAll('.day-cell').forEach(c=>c.classList.remove('selected'));
    const target = document.querySelector(`.day-cell[data-date="${dateStr}"]`);
    if (target) target.classList.add('selected');

    const entries = getEntries(dateStr);
    const dms = dmCache[dateStr] || [];
    const panel = document.getElementById('detail-panel');
    const body = document.getElementById('detail-body');
    const d = new Date(dateStr+'T00:00:00');
    document.getElementById('detail-date').textContent = d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    const countParts = [];
    if (entries.length) countParts.push(`일기 ${entries.length}개`);
    if (dms.length) countParts.push(`DM ${dms.length}개`);
    document.getElementById('detail-count').textContent = countParts.join(' · ');
    panel.style.display='';

    body.innerHTML='';

    // ── 날짜 메모 입력 ──
    const memoRow = document.createElement('div');
    memoRow.className = 'memo-edit-row';
    memoRow.style.padding = '0.85rem 1.25rem';
    memoRow.innerHTML = `
      <input class="memo-input" id="memo-input-field" placeholder="이 날짜에 표시할 메모를 입력하세요" value="${esc(memoCache[dateStr]||'')}">
      <button class="memo-save-btn" id="memo-save-btn">저장</button>`;
    body.appendChild(memoRow);
    document.getElementById('memo-save-btn').addEventListener('click', async ()=>{
      const val = document.getElementById('memo-input-field').value.trim();
      await saveMemo(dateStr, val);
      renderCalendar(curYear, curMonth);
    });
    document.getElementById('memo-input-field').addEventListener('keydown', e=>{
      if (e.key==='Enter') document.getElementById('memo-save-btn').click();
    });

    if (!entries.length && !dms.length){
      const emptyDiv = document.createElement('div');
      emptyDiv.className = 'detail-empty';
      emptyDiv.textContent = '이날은 기록이 없어요.';
      body.appendChild(emptyDiv);
      return;
    }

    // ── 일기 섹션 ──
    if (entries.length){
      const title=document.createElement('div'); title.className='section-title';
      title.innerHTML='📝 일기';
      body.appendChild(title);

      const list=document.createElement('div'); list.className='entries';
      [...entries].reverse().forEach(e=>{
        const div=document.createElement('div'); div.className='entry';
        const avatarInner = e.profilePhoto ? `<img src="${e.profilePhoto}">` : (e.name?e.name.charAt(0).toUpperCase():'<i class="ti ti-user" style="font-size:17px;color:#fff;"></i>');
        div.innerHTML=`
          <div class="e-avatar">${avatarInner}</div>
          <div class="e-body">
            <div class="e-header">
              ${e.name?`<span class="e-name">${esc(e.name)}</span>`:''}
              ${e.uid?`<span class="e-uid">${esc(e.uid)}</span>`:''}
              <span class="e-time">· ${fmtTime(e.timeStr||'')}</span>
            </div>
            ${e.text?`<p class="e-text">${esc(e.text)}</p>`:''}
            ${e.photos&&e.photos.length?`<div class="photos-ph"></div>`:''}
          </div>`;
        list.appendChild(div);
        if (e.photos&&e.photos.length){
          const ph=div.querySelector('.photos-ph');
          const grid=document.createElement('div'); grid.className='e-photos n'+e.photos.length;
          e.photos.forEach(src=>{
            const slot=document.createElement('div'); slot.className='eslot';
            const img=document.createElement('img'); img.src=src;
            img.addEventListener('click',()=>{document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('show');});
            slot.appendChild(img); grid.appendChild(slot);
          });
          ph.replaceWith(grid);
        }
      });
      body.appendChild(list);
    }

    // ── 위버스 DM 섹션 ──
    if (dms.length){
      const title=document.createElement('div'); title.className='section-title dm';
      title.innerHTML='💬 위버스 DM';
      body.appendChild(title);

      const dmList=document.createElement('div');
      dms.forEach(m=>{
        const isMe = m.sender==='me';
        const photo = (!isMe && dmSettings) ? dmSettings.artistPhoto : null;
        const row=document.createElement('div'); row.className='dm-entry'+(isMe?' me':'');
        let bubbles='';
        if (m.text) bubbles += `<div class="dm-bubble">${esc(m.text)}</div>`;
        (m.photos||[]).forEach(src=>{
          bubbles += `<div class="dm-bubble photo"><img src="${src}" data-src="${src}"></div>`;
        });
        row.innerHTML = `
          <div class="dm-avatar">${photo?`<img src="${photo}">`:'<i class="ti ti-user"></i>'}</div>
          <div class="dm-content">${bubbles}<div class="dm-time">${fmtTime(m.time||'')}</div></div>`;
        row.querySelectorAll('.dm-bubble.photo img').forEach(img=>{
          img.addEventListener('click',()=>{document.getElementById('lb-img').src=img.dataset.src;document.getElementById('lightbox').classList.add('show');});
        });
        dmList.appendChild(row);
      });
      body.appendChild(dmList);
    }

    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  document.getElementById('btn-prev').addEventListener('click',()=>{curMonth--;if(curMonth<1){curMonth=12;curYear--;}renderCalendar(curYear,curMonth);});
  document.getElementById('btn-next').addEventListener('click',()=>{curMonth++;if(curMonth>12){curMonth=1;curYear++;}renderCalendar(curYear,curMonth);});
  document.getElementById('btn-today').addEventListener('click',()=>{
    const now=new Date(); renderCalendar(now.getFullYear(),now.getMonth()+1);
    selectDate(toYMD(now.getFullYear(),now.getMonth()+1,now.getDate()));
  });
  document.getElementById('lb-close').addEventListener('click',()=>document.getElementById('lightbox').classList.remove('show'));
  document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('show');});

  async function init(){
    await loadAllEntries();
    updateStats();
    renderTagFilterBar();
    const now=new Date();
    renderCalendar(now.getFullYear(),now.getMonth()+1);
    selectDate(toYMD(now.getFullYear(),now.getMonth()+1,now.getDate()));
  }

  if(getToken()){ showMain(); }
  else { document.getElementById('token-screen').style.display='flex'; }
</script>
</body>
</html>
