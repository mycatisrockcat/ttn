<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일기 위젯</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff; --bg2: #f7f9f9;
    --border: #eff3f4; --border2: #cfd9de;
    --text: #0f1419; --text2: #536471; --text3: #8b98a5;
    --radius: 12px; --blue: #1d9bf0;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#000; --bg2:#16181c; --border:#2f3336; --border2:#3e4144; --text:#e7e9ea; --text2:#71767b; --text3:#555f67; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }
  .wrap { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem; }
  
  /* 날짜 입력창 스타일 */
  .date-header-wrap { margin-bottom: 0.75rem; }
  .date-inp-main { font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text2); background: transparent; border: none; outline: none; cursor: pointer; padding: 2px 0; }
  .date-inp-main::-webkit-calendar-picker-indicator { cursor: pointer; filter: invert(0.4); }
  @media (prefers-color-scheme: dark) {
    .date-inp-main::-webkit-calendar-picker-indicator { filter: invert(0.8); }
  }

  .composer { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 0.5rem; }
  .composer-top { display: flex; gap: 12px; align-items: flex-start; }

  .c-avatar-wrap { position: relative; flex-shrink: 0; cursor: pointer; }
  .c-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 18px; font-weight: 600; color: #fff; transition: filter 0.15s; }
  .c-avatar-wrap:hover .c-avatar { filter: brightness(0.72); }
  .c-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .c-avatar-overlay { position: absolute; inset: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
  .c-avatar-wrap:hover .c-avatar-overlay { opacity: 1; }
  .c-avatar-overlay i { font-size: 16px; color: #fff; }

  .c-right { flex: 1; min-width: 0; }
  .name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .name-row input { font-family: inherit; background: transparent; border: none; outline: none; }
  .inp-name { font-size: 15px; font-weight: 600; color: var(--text); min-width: 60px; width: auto; max-width: 180px; }
  .inp-name::placeholder { color: var(--text3); font-weight: 400; }
  .inp-id { font-size: 14px; color: var(--text3); min-width: 50px; width: auto; max
