<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위버스 DM 아카이브</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f7f7f7;
    --bg3: #efefef;
    --border: #e0e0e0;
    --text: #111111;
    --text2: #666666;
    --text3: #aaaaaa;
    --green: #5cdb95;
    --bubble-artist: #FFB8CC;
    --bubble-artist-text: #111111;
    --bubble-me: #EBE8E8;
    --bubble-me-text: #111111;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text); }
  .wrap { max-width: 480px; margin: 0 auto; padding: 0; display: flex; flex-direction: column; height: 100vh; }

  /* ── 설정 화면 ── */
  .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1.25rem; padding: 2rem; }
  .setup-screen .logo { font-size: 36px; margin-bottom: 0.5rem; }
  .setup-screen h2 { font-size: 20px; font-weight: 700; }
  .setup-screen p { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.6; }
  .setup-section { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 0.75rem; }
  .setup-label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; }
  .setup-avatar-row { display: flex; align-items: center; gap: 14px; }
  .setup-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--bg3); border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; flex-shrink: 0; }
  .setup-avatar:hover { border-color: var(--green); }
  .setup-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .setup-avatar i { font-size: 22px; color: var(--text3); }
  .setup-inp { width: 100%; font-family: inherit; font-size: 15px; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); outline: none; }
  .setup-inp:focus { border-color: var(--green); }
  .setup-inp::placeholder { color: var(--text3); }
  .setup-divider { width: 100%; max-width: 360px; border: none; border-top: 1px solid var(--border); }
  .setup-btn { width: 100%; max-width: 360px; background: var(--green); color: #000; border: none; border-radius: 999px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .setup-btn:hover { opacity: 0.88; }
  .setup-token-inp { width: 100%; max-width: 360px; font-family: inherit; font-size: 13px; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); outline: none; }
  .setup-token-inp:focus { border-color: var(--green); }
  .setup-token-inp::placeholder { color: var(--text3); }
  .setup-hint { font-size: 11px; color: var(--text3); max-width: 360px; text-align: center; line-height: 1.5; }

  /* ── 채팅 헤더 ── */
  .chat-screen { display: none; flex-direction: column; height: 100vh; }
  .chat-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
  .header-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--bg3); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
  .header-avatar:hover { opacity: 0.8; }
  .header-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .header-avatar i { font-size: 18px; color: var(--text3); }
  .header-info { flex: 1; min-width: 0; }
  .header-name { font-size: 15px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--green); }
  .header-actions { display: flex; gap: 4px; }
  .header-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 6px; border-radius: 8px; font-size: 18px; display: flex; align-items: center; }
  .header-btn:hover { background: var(--bg3); }

  /* ── 날짜 구분선 ── */
  .date-divider { text-align: center; margin: 16px 0 8px; }
  .date-divider span { font-size: 11px; color: var(--text3); background: var(--bg); padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border); }

  /* ── 메시지 영역 ── */
  .messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

  .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 100%; }
  .msg-row.me { flex-direction: row-reverse; }
  .msg-row.artist { flex-direction: row; }

  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--bg3); overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; align-self: flex-end; }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .msg-avatar i { font-size: 14px; color: var(--text3); }
  .msg-row.me .msg-avatar { display: none; }

  .msg-content { max-width: 72%; display: flex; flex-direction: column; gap: 2px; }
  .msg-row.me .msg-content { align-items: flex-end; }
  .msg-row.artist .msg-content { align-items: flex-start; }

  .msg-name { font-size: 11px; color: var(--text3); margin-bottom: 2px; padding: 0 4px; }

  .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.55; word-break: break-word; white-space: pre-wrap; max-width: 100%; }
  .msg-row.artist .bubble { background: var(--bubble-artist); color: var(--bubble-artist-text); border-bottom-left-radius: 4px; border: none; }
  .msg-row.me .bubble { background: var(--bubble-me); color: var(--bubble-me-text); border-bottom-right-radius: 4px; }

  /* 사진 버블 */
  .bubble.photo-bubble { padding: 4px; background: transparent; border: none; }
  .bubble.photo-bubble img { max-width: 220px; max-height: 280px; border-radius: 14px; display: block; cursor: zoom-in; object-fit: cover; }
  .msg-row.artist .bubble.photo-bubble img { border-bottom-left-radius: 4px; }
  .msg-row.me .bubble.photo-bubble img { border-bottom-right-radius: 4px; }

  .msg-time { font-size: 10px; color: var(--text3); padding: 0 4px; flex-shrink: 0; }

  /* ── 입력창 ── */
  .input-area { background: var(--bg2); border-top: 1px solid var(--border); padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
  .sender-toggle { display: flex; gap: 6px; }
  .sender-btn { flex: 1; padding: 7px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .sender-btn.active { border-color: var(--green); color: var(--green); background: rgba(92,219,149,0.1); }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .photo-preview-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .photo-thumb { position: relative; width: 56px; height: 56px; border-radius: 10px; overflow: hidden; }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-thumb .del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 11px; }
  .msg-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 22px; padding: 10px 16px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; resize: none; line-height: 1.5; min-height: 42px; max-height: 120px; }
  .msg-input:focus { border-color: var(--green); }
  .msg-input::placeholder { color: var(--text3); }
  .input-btns { display: flex; gap: 4px; align-items: flex-end; }
  .input-icon-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 8px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; }
  .input-icon-btn:hover { color: var(--green); }
  .send-btn { background: var(--green); border: none; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #000; font-size: 18px; flex-shrink: 0; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* 날짜 선택 */
  .date-row { display: flex; align-items: center; gap: 8px; padding: 6px 0 2px; }
  .date-inp { font-family: inherit; font-size: 12px; color: var(--text2); background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; outline: none; cursor: pointer; }
  .date-inp:focus { border-color: var(--green); }
  .date-inp::-webkit-calendar-picker-indicator { filter: invert(0); cursor: pointer; }
  .time-inp2 { font-family: inherit; font-size: 12px; color: var(--text2); background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; outline: none; cursor: pointer; width: 90px; }
  .time-inp2:focus { border-color: var(--green); }

  /* 동기화 */
  .sync-bar { display: flex; align-items: center; gap: 6px; padding: 4px 16px; background: var(--bg); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.saving { background: #ffd400; animation: pulse 1s infinite; }
  .sync-dot.error { background: #f4212e; }
  .sync-txt { font-size: 11px; color: var(--text3); }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  /* 라이트박스 */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .lightbox.show { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 92vw; max-height: 88vh; object-fit: contain; border-radius: 10px; }
  .lb-close { position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,0.15); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .lb-close:hover { background: rgba(255,255,255,0.25); }

  .empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text3); font-size: 14px; }
  .empty-chat i { font-size: 40px; }

  /* 날짜 탭 */
  .date-tabs { display: flex; align-items: center; gap: 6px; padding: 8px 12px; overflow-x: auto; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .date-tabs::-webkit-scrollbar { height: 0; }
  .date-tab { flex-shrink: 0; padding: 5px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; white-space: nowrap; }
  .date-tab.active { background: #FFB8CC; color: #111; border-color: #FFB8CC; }
  .date-tab:hover:not(.active) { background: var(--bg3); }
  .date-tabs-empty { font-size: 12px; color: var(--text3); padding: 8px 12px; }
</style>
</head>
<body>

<!-- 설정 화면 -->
<div class="setup-screen" id="setup-screen">
  <div class="logo">💚</div>
  <h2>위버스 DM 아카이브</h2>
  <p>아티스트와의 DM을 기록하고<br>소중한 대화를 보관하세요.</p>

  <div class="setup-section">
    <div class="setup-label">아티스트</div>
    <div class="setup-avatar-row">
      <div class="setup-avatar" id="artist-avatar-wrap" title="프로필 사진 클릭">
        <i class="ti ti-user"></i>
      </div>
      <input class="setup-inp" id="artist-name-inp" placeholder="아티스트 이름" maxlength="20">
    </div>
  </div>

  <div class="setup-section">
    <div class="setup-label">나</div>
    <div class="setup-avatar-row">
      <div class="setup-avatar" id="my-avatar-wrap" title="프로필 사진 클릭">
        <i class="ti ti-user"></i>
      </div>
      <input class="setup-inp" id="my-name-inp" placeholder="내 닉네임" maxlength="20">
    </div>
  </div>

  <hr class="setup-divider">

  <div class="setup-section">
    <div class="setup-label">GitHub 설정 (데이터 저장용)</div>
    <input class="setup-token-inp" id="setup-token" type="password" placeholder="GitHub Personal Access Token (ghp_...)">
  </div>

  <button class="setup-btn" id="setup-btn">시작하기</button>
  <p class="setup-hint">설정은 이 기기에 저장되며 언제든 변경할 수 있어요.</p>
</div>

<!-- 채팅 화면 -->
<div class="chat-screen" id="chat-screen">
  <div class="chat-header">
    <div class="header-avatar" id="header-avatar-wrap">
      <i class="ti ti-user"></i>
    </div>
    <div class="header-info">
      <div class="header-name" id="header-name">아티스트</div>
      
    </div>
    <div class="header-actions">
      <button class="header-btn" id="btn-reset" title="설정 초기화"><i class="ti ti-settings"></i></button>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span class="sync-txt" id="sync-txt">불러오는 중...</span>
  </div>

  <div class="date-tabs" id="date-tabs"><span class="date-tabs-empty">대화 날짜가 여기에 표시돼요</span></div>
  <div class="messages" id="messages">
    <div class="empty-chat" id="empty-chat">
      <i class="ti ti-message-2"></i>
      <span>아직 대화가 없어요.<br>첫 메시지를 기록해보세요!</span>
    </div>
  </div>

  <div class="input-area">
    <div class="sender-toggle">
      <button class="sender-btn" id="btn-artist" data-sender="artist">아티스트</button>
      <button class="sender-btn active" id="btn-me" data-sender="me">나</button>
    </div>
    <div class="photo-preview-row" id="photo-preview-row" style="display:none;"></div>
    <div class="date-row">
      <input type="date" class="date-inp" id="msg-date">
      <input type="time" class="time-inp2" id="msg-time">
    </div>
    <div class="input-row">
      <button class="input-icon-btn" id="btn-photo-add" title="사진 추가"><i class="ti ti-photo"></i></button>
      <textarea class="msg-input" id="msg-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      <div class="input-btns">
        <button class="send-btn" id="send-btn" disabled><i class="ti ti-send"></i></button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="artist-avatar-file" accept="image/*" style="display:none;">
<input type="file" id="my-avatar-file" accept="image/*" style="display:none;">
<input type="file" id="photo-file" accept="image/*" multiple style="display:none;">

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close"><i class="ti ti-x"></i></button>
  <img id="lb-img" src="" alt="">
</div>

<script>
  const GITHUB_OWNER  = 'mycatisrockcat';
  const GITHUB_REPO   = 'diary-data';
  const GITHUB_BRANCH = 'main';
  const SETTINGS_KEY  = 'weverse_settings';
  const TOKEN_KEY     = 'diary_github_token';

  let settings = null;
  let messages = [];
  let pendingPhotos = [];
  let fileSha = null;
  let currentSender = 'me';
  let setupArtistPhoto = null;
  let setupMyPhoto = null;

  // ── 유틸 ──
  function getTodayYMD() { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function nowTime() { return new Date().toTimeString().slice(0,5); }
  function fmtTime(s) { if(!s)return''; const [h,m]=s.split(':').map(Number); return `${h<12?'오전':'오후'} ${h===0?12:h>12?h-12:h}:${String(m).padStart(2,'0')}`; }
  function fmtDate(s) { if(!s)return''; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'}); }
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function getToken(){return localStorage.getItem(TOKEN_KEY)||'';}

  // ── GitHub API ──
  async function ghGet(path){
    const res=await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`,{headers:{Authorization:`token ${getToken()}`,Accept:'application/vnd.github.v3+json'}});
    if(res.status===404)return null;
    if(!res.ok)throw new Error('읽기 실패');
    return res.json();
  }
  async function ghPut(path,content,sha){
    const body={message:`weverse: ${path}`,content:btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2)))),branch:GITHUB_BRANCH};
    if(sha)body.sha=sha;
    const res=await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`,{method:'PUT',headers:{Authorization:`token ${getToken()}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok)throw new Error('저장 실패');
    return res.json();
  }

  function setSyncStatus(state,msg){
    document.getElementById('sync-dot').className='sync-dot '+state;
    document.getElementById('sync-txt').textContent=msg;
  }

  // ── 설정 화면 ──
  function loadSetupScreen(){
    // 아바타 클릭
    document.getElementById('artist-avatar-wrap').addEventListener('click',()=>document.getElementById('artist-avatar-file').click());
    document.getElementById('my-avatar-wrap').addEventListener('click',()=>document.getElementById('my-avatar-file').click());
    document.getElementById('artist-avatar-file').addEventListener('change',e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=ev=>{setupArtistPhoto=ev.target.result;document.getElementById('artist-avatar-wrap').innerHTML=`<img src="${setupArtistPhoto}">`;};r.readAsDataURL(f);
    });
    document.getElementById('my-avatar-file').addEventListener('change',e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=ev=>{setupMyPhoto=ev.target.result;document.getElementById('my-avatar-wrap').innerHTML=`<img src="${setupMyPhoto}">`;};r.readAsDataURL(f);
    });

    document.getElementById('setup-btn').addEventListener('click',async()=>{
      const token=document.getElementById('setup-token').value.trim();
      const artistName=document.getElementById('artist-name-inp').value.trim();
      const myName=document.getElementById('my-name-inp').value.trim();
      if(!token||!artistName||!myName){alert('모든 항목을 입력해주세요.');return;}
      // 토큰 확인
      try{
        const res=await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}`,{headers:{Authorization:`token ${token}`}});
        if(!res.ok)throw new Error();
      }catch(e){alert('GitHub 토큰이 올바르지 않아요.');return;}
      localStorage.setItem(TOKEN_KEY,token);
      settings={artistName,myName,artistPhoto:setupArtistPhoto,myPhoto:setupMyPhoto};
      localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings));
      showChatScreen();
    });
  }

  // ── 채팅 화면 ──
  function showChatScreen(){
    document.getElementById('setup-screen').style.display='none';
    const cs=document.getElementById('chat-screen');cs.style.display='flex';
    // 헤더 세팅
    document.getElementById('header-name').textContent=settings.artistName;
    document.getElementById('btn-artist').textContent=settings.artistName;
    if(settings.artistPhoto){document.getElementById('header-avatar-wrap').innerHTML=`<img src="${settings.artistPhoto}">`;}
    // 날짜/시간 기본값
    const urlParams=new URLSearchParams(location.search);
    const d=urlParams.get('d')||getTodayYMD();
    document.getElementById('msg-date').value=d;
    document.getElementById('msg-time').value=nowTime();
    // 이벤트
    document.getElementById('btn-reset').addEventListener('click',()=>{if(confirm('설정을 초기화할까요?')){localStorage.removeItem(SETTINGS_KEY);localStorage.removeItem(TOKEN_KEY);location.reload();}});
    document.getElementById('btn-me').addEventListener('click',()=>setSender('me'));
    document.getElementById('btn-artist').addEventListener('click',()=>setSender('artist'));
    document.getElementById('btn-photo-add').addEventListener('click',()=>{document.getElementById('photo-file').value='';document.getElementById('photo-file').click();});
    document.getElementById('photo-file').addEventListener('change',e=>{
      const files=Array.from(e.target.files).slice(0,4-pendingPhotos.length);let done=0;
      files.forEach(f=>{const r=new FileReader();r.onload=ev=>{pendingPhotos.push(ev.target.result);done++;if(done===files.length){renderPhotoPreview();checkSendBtn();}};r.readAsDataURL(f);});
    });
    const inp=document.getElementById('msg-input');
    inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=inp.scrollHeight+'px';checkSendBtn();});
    inp.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){e.preventDefault();doSend();}});
    document.getElementById('send-btn').addEventListener('click',doSend);
    // 라이트박스
    document.getElementById('lb-close').addEventListener('click',()=>document.getElementById('lightbox').classList.remove('show'));
    document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))document.getElementById('lightbox').classList.remove('show');});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lightbox').classList.remove('show');});
    // 로드
    loadMessages();
  }

  function setSender(s){
    currentSender=s;
    document.getElementById('btn-me').className='sender-btn'+(s==='me'?' active':'');
    document.getElementById('btn-artist').className='sender-btn'+(s==='artist'?' active':'');
  }

  function checkSendBtn(){
    const hasText=document.getElementById('msg-input').value.trim()!=='';
    document.getElementById('send-btn').disabled=!hasText&&pendingPhotos.length===0;
  }

  function renderPhotoPreview(){
    const row=document.getElementById('photo-preview-row');
    if(!pendingPhotos.length){row.style.display='none';row.innerHTML='';return;}
    row.style.display='flex';row.innerHTML='';
    pendingPhotos.forEach((src,i)=>{
      const wrap=document.createElement('div');wrap.className='photo-thumb';
      wrap.innerHTML=`<img src="${src}"><button class="del"><i class="ti ti-x"></i></button>`;
      wrap.querySelector('.del').addEventListener('click',()=>{pendingPhotos.splice(i,1);renderPhotoPreview();checkSendBtn();});
      row.appendChild(wrap);
    });
  }

  // ── 메시지 로드/저장 ──
  function getFilePath(){ return 'weverse/messages.json'; }

  async function loadMessages(){
    setSyncStatus('saving','불러오는 중...');
    try{
      const file=await ghGet(getFilePath());
      if(file){fileSha=file.sha;messages=JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g,'')))));}
      else{fileSha=null;messages=[];}
      setSyncStatus('ok','저장됨');
    }catch(e){setSyncStatus('error','불러오기 실패');}
    renderTabs();renderMessages();
  }

  async function saveMessages(){
    setSyncStatus('saving','저장 중...');
    try{
      const res=await ghPut(getFilePath(),messages,fileSha);
      fileSha=res.content.sha;
      setSyncStatus('ok','저장 완료 ✓');
    }catch(e){setSyncStatus('error','저장 실패');}
  }

  // ── 메시지 전송 ──
  async function doSend(){
    const text=document.getElementById('msg-input').value.trim();
    if(!text&&pendingPhotos.length===0)return;
    const date=document.getElementById('msg-date').value||getTodayYMD();
    const time=document.getElementById('msg-time').value||nowTime();
    const msg={id:Date.now(),sender:currentSender,text,photos:[...pendingPhotos],date,time};
    messages.push(msg);
    renderTabs();renderMessages();
    document.getElementById('msg-input').value='';
    document.getElementById('msg-input').style.height='auto';
    pendingPhotos=[];renderPhotoPreview();checkSendBtn();
    document.getElementById('msg-time').value=nowTime();
    document.getElementById('msg-date').value=activeDate||getTodayYMD();
    await saveMessages();
    // 스크롤 아래로
    const mc=document.getElementById('messages');mc.scrollTop=mc.scrollHeight;
  }

  // ── 날짜 탭 ──
  let activeDate = null;

  function getGroups(){
    const groups={};
    messages.forEach(m=>{if(!groups[m.date])groups[m.date]=[];groups[m.date].push(m);});
    return groups;
  }

  function renderTabs(){
    const tabBar=document.getElementById('date-tabs');
    tabBar.innerHTML='';
    const groups=getGroups();
    const dates=Object.keys(groups).sort();
    if(!dates.length){tabBar.innerHTML='<span class="date-tabs-empty">대화 날짜가 여기에 표시돼요</span>';return;}
    // activeDate가 없거나 없어진 날짜면 최신 날짜로
    if(!activeDate||!dates.includes(activeDate)) activeDate=dates[dates.length-1];
    dates.forEach(date=>{
      const btn=document.createElement('button');
      btn.className='date-tab'+(date===activeDate?' active':'');
      btn.textContent=date;
      btn.addEventListener('click',()=>{activeDate=date;renderTabs();renderMessages();});
      tabBar.appendChild(btn);
    });
  }

  // ── 렌더링 ──
  function renderMessages(){
    const container=document.getElementById('messages');
    Array.from(container.children).forEach(el=>{if(el.id!=='empty-chat')el.remove();});
    const empty=document.getElementById('empty-chat');
    const groups=getGroups();
    const dates=Object.keys(groups).sort();
    if(!messages.length||!dates.length){empty.style.display='flex';return;}
    empty.style.display='none';
    if(!activeDate||!dates.includes(activeDate)) activeDate=dates[dates.length-1];

    const dayMsgs=groups[activeDate]||[];
    dayMsgs.forEach((m,idx)=>{
      const isMe=m.sender==='me';
      const photo=isMe?settings.myPhoto:settings.artistPhoto;

      const row=document.createElement('div');
      row.className='msg-row '+(isMe?'me':'artist');
      row.dataset.id=m.id;

      const avatarEl=`<div class="msg-avatar">${photo?`<img src="${photo}">`:'<i class="ti ti-user"></i>'}</div>`;

      let bubblesHtml='';
      if(m.text) bubblesHtml+=`<div class="bubble">${esc(m.text)}</div>`;
      m.photos&&m.photos.forEach(src=>{
        bubblesHtml+=`<div class="bubble photo-bubble"><img src="${src}" data-src="${src}"></div>`;
      });

      const timeHtml=`<div class="msg-time">${fmtTime(m.time)}</div>`;
      const deleteHtml=`<button class="input-icon-btn del-msg" data-id="${m.id}" title="삭제" style="font-size:14px;opacity:0.4;"><i class="ti ti-trash"></i></button>`;

      row.innerHTML = isMe
        ? `${deleteHtml}${timeHtml}<div class="msg-content">${bubblesHtml}</div>`
        : `${avatarEl}<div class="msg-content">${bubblesHtml}</div>${timeHtml}${deleteHtml}`;

      row.querySelectorAll('.photo-bubble img').forEach(img=>{
        img.addEventListener('click',()=>{
          document.getElementById('lb-img').src=img.dataset.src;
          document.getElementById('lightbox').classList.add('show');
        });
      });

      row.querySelector('.del-msg').addEventListener('click',async()=>{
        if(confirm('이 메시지를 삭제할까요?')){
          messages=messages.filter(x=>x.id!==m.id);
          renderTabs();renderMessages();
          await saveMessages();
        }
      });

      container.appendChild(row);
    });

    container.scrollTop=container.scrollHeight;
  }

  // ── 시작 ──
  loadSetupScreen();
  const saved=localStorage.getItem(SETTINGS_KEY);
  if(saved&&getToken()){
    settings=JSON.parse(saved);
    showChatScreen();
  } else {
    document.getElementById('setup-screen').style.display='flex';
  }
</script>
</body>
</html>
