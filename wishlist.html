<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위시리스트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg:#ffffff; --bg2:#f7f9f9; --bg3:#efefef;
    --border:#eff3f4; --border2:#cfd9de;
    --text:#0f1419; --text2:#536471; --text3:#8b98a5;
    --blue:#1d9bf0; --radius:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#000;--bg2:#16181c;--bg3:#1e2024;--border:#2f3336;--border2:#3e4144;--text:#e7e9ea;--text2:#71767b;--text3:#555f67;}
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}
  .wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem;}

  /* 토큰 화면 */
  .token-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;text-align:center;}
  .token-screen h2{font-size:18px;font-weight:700;}
  .token-screen p{font-size:14px;color:var(--text2);line-height:1.6;max-width:400px;}
  .gh-field{width:100%;max-width:420px;font-family:inherit;font-size:13px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;}
  .gh-field:focus{border-color:var(--blue);}
  .token-input{width:100%;max-width:420px;font-family:inherit;font-size:13px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;}
  .token-input:focus{border-color:var(--blue);}
  .token-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .token-btn:hover{background:#1a8cd8;}

  .main-screen{display:none;}
  .sync-status{font-size:12px;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
  .sync-dot.ok{background:#00ba7c;}
  .sync-dot.saving{background:#ffd400;animation:pulse 1s infinite;}
  .sync-dot.error{background:#f4212e;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* 헤더 */
  .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
  .header-title{font-size:20px;font-weight:700;}
  .reset-btn{background:none;border:0.5px solid var(--border2);color:var(--text2);border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .reset-btn:hover{background:var(--bg2);color:var(--blue);}

  /* 탭 */
  .tab-bar{display:flex;gap:4px;overflow-x:auto;margin-bottom:1.25rem;border-bottom:0.5px solid var(--border);}
  .tab-btn{flex-shrink:0;background:none;border:none;padding:10px 16px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}

  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* 추가 버튼 */
  .add-item-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;margin-bottom:1.25rem;}
  .add-item-btn:hover{background:#1a8cd8;}

  /* 갤러리 그리드 */
  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}
  .item-card{border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border2);background:var(--bg);position:relative;}
  .item-card-img{width:100%;height:200px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);overflow:hidden;}
  .item-card-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .item-card-body{padding:10px 12px;}
  .item-card-title{font-size:14px;font-weight:700;margin-bottom:3px;line-height:1.3;}
  .item-card-author{font-size:12px;color:var(--text3);margin-bottom:4px;}
  .item-card-price{font-size:12px;color:var(--blue);font-weight:600;}
  .item-card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
  .item-tag-chip{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--bg2);color:var(--text2);}
  .item-card-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;}
  .item-card-btn{background:rgba(0,0,0,0.55);border:none;border-radius:50%;width:26px;height:26px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .item-card-btn:hover{background:rgba(0,0,0,0.75);}
  .empty-msg{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;}

  /* 입력/수정 모달 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--bg);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:420px;display:flex;flex-direction:column;gap:12px;max-height:90vh;overflow-y:auto;}
  .modal-box h3{font-size:16px;font-weight:700;margin-bottom:4px;}
  .field-row{display:flex;flex-direction:column;gap:4px;}
  .field-row label{font-size:12px;font-weight:600;color:var(--text2);}
  .field-row input,.field-row textarea{font-family:inherit;font-size:14px;padding:9px 12px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;}
  .field-row input:focus,.field-row textarea:focus{border-color:var(--blue);}
  .field-row textarea{resize:vertical;line-height:1.5;}

  .img-upload-row{display:flex;align-items:center;gap:10px;}
  .img-preview{width:64px;height:64px;border-radius:10px;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;}
  .img-preview img{width:100%;height:100%;object-fit:cover;}
  .img-upload-btn{background:var(--bg2);border:1px dashed var(--border2);border-radius:10px;padding:8px 14px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;}
  .img-upload-btn:hover{border-color:var(--blue);color:var(--blue);}

  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;}
  .modal-btn{border:none;border-radius:999px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .modal-btn.cancel{background:var(--bg3);color:var(--text2);}
  .modal-btn.confirm{background:var(--blue);color:#fff;}

  /* 라이트박스 */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .lightbox.show{opacity:1;pointer-events:all;}
  .lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;}
  .lb-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:999px;font-size:13px;opacity:0;transition:all 0.25s ease;pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">

  <!-- 토큰 화면 -->
  <div class="token-screen" id="token-screen">
    <h2>🎁 위시리스트</h2>
    <p>GitHub에 위시리스트 데이터를 저장합니다.<br>한 번만 입력하면 이 기기에 저장돼요.</p>
    <input class="gh-field" id="gh-owner" placeholder="GitHub 사용자명" autocomplete="off">
    <input class="gh-field" id="gh-repo" placeholder="저장소 이름 (예: diary-data)" autocomplete="off">
    <input class="token-input" id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off">
    <button class="token-btn" id="token-btn">저장하고 시작하기</button>
  </div>

  <!-- 메인 화면 -->
  <div class="main-screen" id="main-screen">
    <div class="header-row">
      <div class="header-title">🎁 위시리스트</div>
      <button class="reset-btn" id="reset-btn" title="GitHub 설정 재설정"><i class="ti ti-settings"></i></button>
    </div>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-msg">불러오는 중...</span>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-cat="book"><i class="ti ti-book"></i> 책</button>
      <button class="tab-btn" data-cat="movie"><i class="ti ti-movie"></i> 영화/드라마</button>
      <button class="tab-btn" data-cat="comic"><i class="ti ti-feather"></i> 만화</button>
      <button class="tab-btn" data-cat="novel"><i class="ti ti-notebook"></i> 장르소설</button>
      <button class="tab-btn" data-cat="webtoon"><i class="ti ti-device-tablet"></i> 웹툰</button>
      <button class="tab-btn" data-cat="game"><i class="ti ti-device-gamepad-2"></i> 게임</button>
    </div>

    <button class="add-item-btn" id="add-item-btn"><i class="ti ti-plus"></i> 새 항목 추가</button>

    <div class="item-grid" id="item-grid"></div>
    <div class="empty-msg" id="empty-msg" style="display:none;">아직 추가한 항목이 없어요.</div>
  </div>

  <!-- 입력/수정 모달 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <h3 id="modal-title">새 항목 추가</h3>

      <div class="field-row">
        <label>이미지</label>
        <div class="img-upload-row">
          <div class="img-preview" id="img-preview"><i class="ti ti-photo"></i></div>
          <button class="img-upload-btn" id="img-upload-btn" type="button">사진 선택</button>
          <input type="file" id="img-file-input" accept="image/*" style="display:none;">
        </div>
      </div>

      <div class="field-row">
        <label>제목</label>
        <input type="text" id="f-title" placeholder="제목">
      </div>

      <div class="field-row" id="f-author-row">
        <label>작가</label>
        <input type="text" id="f-author" placeholder="작가">
      </div>

      <div class="field-row" id="f-tag-row">
        <label>태그 (장르, 쉼표로 구분)</label>
        <input type="text" id="f-tag" placeholder="예: 판타지, 로맨스">
      </div>

      <div class="field-row" id="f-price-row">
        <label>가격</label>
        <input type="number" id="f-price" placeholder="원">
      </div>

      <div class="field-row">
        <label>설명</label>
        <textarea id="f-desc" rows="3" placeholder="간단한 설명이나 메모"></textarea>
      </div>

      <div class="modal-actions">
        <button class="modal-btn cancel" id="modal-cancel">취소</button>
        <button class="modal-btn confirm" id="modal-confirm">저장</button>
      </div>
    </div>
  </div>

</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close"><i class="ti ti-x"></i></button>
  <img id="lb-img" src="" alt="">
</div>
<div class="toast" id="toast"></div>

<script src="wishlist-app.js"></script>
</body>
</html>
