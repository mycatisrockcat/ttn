<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독서 기록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg:#ffffff; --bg2:#f7f9f9; --bg3:#efefef;
    --border:#eff3f4; --border2:#cfd9de;
    --text:#0f1419; --text2:#536471; --text3:#8b98a5;
    --blue:#1d9bf0; --gold:#ffb800; --radius:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#000;--bg2:#16181c;--bg3:#1e2024;--border:#2f3336;--border2:#3e4144;--text:#e7e9ea;--text2:#71767b;--text3:#555f67;}
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}
  .wrap{max-width:900px;margin:0 auto;padding:1.5rem 1rem;}

  /* 토큰 화면 */
  .token-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;text-align:center;}
  .token-screen h2{font-size:18px;font-weight:700;}
  .token-screen p{font-size:14px;color:var(--text2);line-height:1.6;max-width:400px;}
  .gh-field{width:100%;max-width:420px;font-family:inherit;font-size:13px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;}
  .gh-field:focus{border-color:var(--blue);}
  .token-input{width:100%;max-width:420px;font-family:inherit;font-size:13px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;}
  .token-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .token-btn:hover{background:#1a8cd8;}

  .main-screen{display:none;}
  .sync-status{font-size:12px;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
  .sync-dot.ok{background:#00ba7c;}
  .sync-dot.saving{background:#ffd400;animation:pulse 1s infinite;}
  .sync-dot.error{background:#f4212e;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
  .header-title{font-size:20px;font-weight:700;}
  .reset-btn{background:none;border:0.5px solid var(--border2);color:var(--text2);border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .reset-btn:hover{background:var(--bg2);color:var(--blue);}

  /* 목록 화면 */
  .list-screen{display:none;}
  .filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
  .filter-chip{font-size:12px;padding:5px 12px;border-radius:999px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-family:inherit;}
  .filter-chip:hover{background:var(--bg2);}
  .filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue);}

  .add-book-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;margin-bottom:1.25rem;}
  .add-book-btn:hover{background:#1a8cd8;}

  .book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}
  .book-card{border-radius:var(--radius);overflow:hidden;border:0.5px solid var(--border2);background:var(--bg);cursor:pointer;position:relative;}
  .book-card:hover{border-color:var(--blue);}
  .book-cover{width:100%;height:220px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);overflow:hidden;}
  .book-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .book-card-body{padding:10px 12px;}
  .book-title{font-size:14px;font-weight:700;margin-bottom:3px;line-height:1.3;}
  .book-author{font-size:12px;color:var(--text3);margin-bottom:4px;}
  .book-meta-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
  .book-status-badge{font-size:10px;padding:2px 8px;border-radius:999px;color:#fff;}
  .book-stars{font-size:11px;color:var(--gold);}
  .book-delete-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.55);border:none;border-radius:50%;width:24px;height:24px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .empty-msg{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;}

  /* 상세 화면 */
  .detail-screen{display:none;}
  .detail-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
  .back-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:6px;border-radius:50%;display:flex;align-items:center;}
  .back-btn:hover{background:var(--bg2);}
  .detail-title{font-size:18px;font-weight:700;flex:1;}

  .book-info-card{display:flex;gap:16px;margin-bottom:1.5rem;}
  .book-info-cover-wrap{flex-shrink:0;}
  .book-info-cover{width:120px;height:170px;border-radius:10px;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--text3);cursor:pointer;position:relative;}
  .book-info-cover img{width:100%;height:100%;object-fit:cover;display:block;}
  .book-info-cover:hover .cover-overlay{opacity:1;}
  .cover-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;color:#fff;opacity:0;transition:opacity 0.15s;font-size:13px;}
  .book-info-fields{flex:1;display:flex;flex-direction:column;gap:10px;}
  .info-field-row{display:flex;flex-direction:column;gap:3px;}
  .info-field-row label{font-size:11px;font-weight:600;color:var(--text2);}
  .info-field-row input,.info-field-row select{font-family:inherit;font-size:13px;padding:7px 10px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
  .info-field-row input:focus,.info-field-row select:focus{border-color:var(--blue);}
  .info-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .star-picker{display:flex;gap:3px;}
  .star-picker i{font-size:20px;color:var(--border2);cursor:pointer;}
  .star-picker i.filled{color:var(--gold);}
  .save-info-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;align-self:flex-start;}
  .save-info-btn:hover{background:#1a8cd8;}

  /* 목차 영역 */
  .toc-layout{display:grid;grid-template-columns:220px 1fr;gap:20px;border-top:0.5px solid var(--border);padding-top:1.25rem;}
  .toc-side{display:flex;flex-direction:column;gap:2px;}
  .toc-side-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;}
  .toc-item{display:flex;align-items:center;gap:4px;}
  .toc-item-btn{flex:1;text-align:left;background:none;border:none;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .toc-item-btn:hover{background:var(--bg2);}
  .toc-item-btn.active{background:var(--blue);color:#fff;}
  .toc-item-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;font-size:12px;flex-shrink:0;}
  .toc-item-del:hover{color:#c0392b;}
  .add-toc-row{display:flex;gap:6px;margin-top:8px;}
  .add-toc-row textarea{width:100%;font-family:inherit;font-size:12px;padding:8px 10px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;resize:vertical;line-height:1.5;}
  .add-toc-row textarea:focus{border-color:var(--blue);}
  .add-toc-row input{flex:1;font-family:inherit;font-size:12px;padding:6px 8px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
  .add-toc-row input:focus{border-color:var(--blue);}
  .add-toc-btn{background:var(--bg2);border:1px dashed var(--border2);border-radius:8px;color:var(--text2);font-size:12px;padding:6px 10px;cursor:pointer;font-family:inherit;}
  .add-toc-btn:hover{border-color:var(--blue);color:var(--blue);}

  .toc-main{display:flex;flex-direction:column;gap:10px;}
  .toc-main-title{font-size:15px;font-weight:700;}
  .toc-main-textarea{width:100%;min-height:340px;font-family:inherit;font-size:14px;padding:14px;border:0.5px solid var(--border2);border-radius:12px;background:var(--bg2);color:var(--text);outline:none;resize:vertical;line-height:1.7;}
  .toc-main-textarea:focus{border-color:var(--blue);}
  .toc-save-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;align-self:flex-end;}
  .toc-save-btn:hover{background:#1a8cd8;}
  .toc-empty{text-align:center;color:var(--text3);font-size:13px;padding:3rem 1rem;}

  @media (max-width:680px){ .toc-layout{grid-template-columns:1fr;} .book-info-card{flex-direction:column;} }

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:999px;font-size:13px;opacity:0;transition:all 0.25s ease;pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">

  <!-- 토큰 화면 -->
  <div class="token-screen" id="token-screen">
    <h2>📚 독서 기록</h2>
    <p>GitHub에 독서 기록 데이터를 저장합니다.<br>한 번만 입력하면 이 기기에 저장돼요.</p>
    <input class="gh-field" id="gh-owner" placeholder="GitHub 사용자명" autocomplete="off">
    <input class="gh-field" id="gh-repo" placeholder="저장소 이름 (예: diary-data)" autocomplete="off">
    <input class="token-input" id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off">
    <button class="token-btn" id="token-btn">저장하고 시작하기</button>
  </div>

  <!-- 메인 화면 -->
  <div class="main-screen" id="main-screen">
    <div class="header-row">
      <div class="header-title">📚 독서 기록</div>
      <button class="reset-btn" id="reset-btn" title="GitHub 설정 재설정"><i class="ti ti-settings"></i></button>
    </div>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-msg">불러오는 중...</span>
    </div>

    <!-- 목록 화면 -->
    <div class="list-screen" id="list-screen">
      <button class="add-book-btn" id="add-book-btn"><i class="ti ti-plus"></i> 새 책 추가</button>
      <div class="filter-bar" id="filter-bar"></div>
      <div class="book-grid" id="book-grid"></div>
      <div class="empty-msg" id="empty-msg" style="display:none;">아직 추가한 책이 없어요.</div>
    </div>

    <!-- 상세 화면 -->
    <div class="detail-screen" id="detail-screen">
      <div class="detail-header">
        <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
        <div class="detail-title" id="detail-title">책 제목</div>
      </div>

      <div class="book-info-card">
        <div class="book-info-cover-wrap">
          <div class="book-info-cover" id="book-info-cover" title="클릭해서 표지 변경">
            <i class="ti ti-book" style="font-size:32px;"></i>
            <div class="cover-overlay">표지 변경</div>
          </div>
          <input type="file" id="cover-file-input" accept="image/*" style="display:none;">
        </div>
        <div class="book-info-fields">
          <div class="info-2col">
            <div class="info-field-row">
              <label>제목</label>
              <input type="text" id="f-title">
            </div>
            <div class="info-field-row">
              <label>작가</label>
              <input type="text" id="f-author">
            </div>
          </div>
          <div class="info-2col">
            <div class="info-field-row">
              <label>상태</label>
              <select id="f-status">
                <option value="읽는 중">읽는 중</option>
                <option value="읽다 맘">읽다 맘</option>
                <option value="읽음">읽음</option>
                <option value="발췌독">발췌독</option>
              </select>
            </div>
            <div class="info-field-row">
              <label>매체</label>
              <select id="f-medium">
                <option value="종이책">종이책</option>
                <option value="이북">이북</option>
              </select>
            </div>
          </div>
          <div class="info-2col">
            <div class="info-field-row">
              <label>장르</label>
              <select id="f-genre">
                <option value="경제경영">경제경영</option>
                <option value="인문학">인문학</option>
                <option value="사회과학">사회과학</option>
                <option value="역사">역사</option>
                <option value="예술">예술</option>
                <option value="과학">과학</option>
                <option value="자기계발">자기계발</option>
                <option value="소설">소설</option>
                <option value="에세이">에세이</option>
                <option value="기타">기타</option>
              </select>
            </div>
            <div class="info-field-row">
              <label>별점</label>
              <div class="star-picker" id="star-picker">
                <i class="ti ti-star" data-v="1"></i>
                <i class="ti ti-star" data-v="2"></i>
                <i class="ti ti-star" data-v="3"></i>
                <i class="ti ti-star" data-v="4"></i>
                <i class="ti ti-star" data-v="5"></i>
              </div>
            </div>
          </div>
          <div class="info-2col">
            <div class="info-field-row">
              <label>시작일</label>
              <input type="date" id="f-start">
            </div>
            <div class="info-field-row">
              <label>종료일</label>
              <input type="date" id="f-end">
            </div>
          </div>
          <button class="save-info-btn" id="save-info-btn">정보 저장</button>
        </div>
      </div>

      <div class="toc-layout">
        <div class="toc-side">
          <div class="toc-side-title">목차</div>
          <div id="toc-list"></div>
          <div class="add-toc-row" style="flex-direction:column;align-items:stretch;">
            <textarea id="new-toc-input" rows="4" placeholder="목차를 한 줄에 하나씩 입력하세요&#10;예시:&#10;프롤로그&#10;1부 | 고통의 각&#10;2부 | 사람의 곁"></textarea>
            <button class="add-toc-btn" id="add-toc-btn" style="margin-top:6px;">목차 일괄 추가</button>
          </div>
        </div>
        <div class="toc-main" id="toc-main">
          <div class="toc-empty">목차를 추가하고 선택하면<br>여기에 텍스트를 적을 수 있어요.</div>
        </div>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script src="reading-app.js"></script>
</body>
</html>
