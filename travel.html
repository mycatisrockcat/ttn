<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 기록</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root {
    --bg:#ffffff; --bg2:#f7f9f9; --bg3:#efefef;
    --border:#eff3f4; --border2:#cfd9de;
    --text:#0f1419; --text2:#536471; --text3:#8b98a5;
    --blue:#1d9bf0; --radius:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#000;--bg2:#16181c;--bg3:#1e2024;--border:#2f3336;--border2:#3e4144;--text:#e7e9ea;--text2:#71767b;--text3:#555f67;}
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}
  .wrap{max-width:720px;margin:0 auto;padding:1.5rem 1rem;}

  /* 토큰 화면 */
  .token-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;text-align:center;}
  .token-screen h2{font-size:18px;font-weight:700;}
  .token-screen p{font-size:14px;color:var(--text2);line-height:1.6;max-width:400px;}
  .token-input{width:100%;max-width:420px;font-family:inherit;font-size:13px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;}
  .token-input:focus{border-color:var(--blue);}
  .token-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:10px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .token-btn:hover{background:#1a8cd8;}
  .gh-field{width:100%;max-width:420px;font-family:inherit;font-size:13px;padding:10px 14px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;}
  .gh-field:focus{border-color:var(--blue);}

  .main-screen{display:none;}
  .sync-status{font-size:12px;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
  .sync-dot.ok{background:#00ba7c;}
  .sync-dot.saving{background:#ffd400;animation:pulse 1s infinite;}
  .sync-dot.error{background:#f4212e;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* 여행 목록 화면 */
  .list-screen{display:none;}
  .list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
  .list-title{font-size:20px;font-weight:700;}
  .new-trip-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:8px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;}
  .new-trip-btn:hover{background:#1a8cd8;}
  .trip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
  .trip-card{border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;cursor:pointer;background:var(--bg);transition:transform 0.1s;}
  .trip-card:hover{border-color:var(--blue);}
  .trip-card-img{width:100%;height:130px;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;}
  .trip-card-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .trip-card-body{padding:12px 14px;}
  .trip-card-name{font-size:15px;font-weight:700;margin-bottom:4px;}
  .trip-card-date{font-size:12px;color:var(--text3);margin-bottom:8px;}
  .trip-status{display:inline-block;font-size:11px;padding:3px 10px;border-radius:999px;color:#fff;}
  .empty-trips{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;}

  /* 여행 만들기 모달 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--bg);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:380px;display:flex;flex-direction:column;gap:12px;}
  .modal-box h3{font-size:16px;font-weight:700;margin-bottom:4px;}
  .modal-field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;}
  .modal-field input{width:100%;font-family:inherit;font-size:14px;padding:8px 12px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
  .modal-field input:focus{border-color:var(--blue);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px;}
  .modal-btn{border:none;border-radius:999px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
  .modal-btn.cancel{background:var(--bg3);color:var(--text2);}
  .modal-btn.confirm{background:var(--blue);color:#fff;}

  /* 여행 상세 화면 */
  .detail-screen{display:none;}
  .detail-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
  .back-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:6px;border-radius:50%;display:flex;align-items:center;}
  .back-btn:hover{background:var(--bg2);}
  .detail-title{font-size:18px;font-weight:700;flex:1;}
  .delete-trip-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:6px;border-radius:50%;}
  .delete-trip-btn:hover{color:#c0392b;background:#fff0f0;}

  .tab-bar{display:flex;gap:4px;overflow-x:auto;margin-bottom:1.25rem;border-bottom:0.5px solid var(--border);}
  .tab-btn{flex-shrink:0;background:none;border:none;padding:10px 16px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;}
  .tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);}

  .tab-content{display:none;}
  .tab-content.active{display:block;}

  /* 개요 탭 */
  .field-row{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
  .field-row label{font-size:12px;font-weight:600;color:var(--text2);}
  .field-row input,.field-row select,.field-row textarea{font-family:inherit;font-size:14px;padding:9px 12px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;}
  .field-row input:focus,.field-row select:focus,.field-row textarea:focus{border-color:var(--blue);}
  .field-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .save-btn{background:var(--blue);color:#fff;border:none;border-radius:999px;padding:9px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .save-btn:hover{background:#1a8cd8;}

  /* 일정 탭 */
  .day-block{border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
  .day-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .day-block-header input[type="date"]{font-family:inherit;font-size:14px;font-weight:700;border:none;background:transparent;color:var(--text);outline:none;}
  .sched-row{display:flex;gap:8px;align-items:center;margin-bottom:4px;}
  .sched-row-wrap{margin-bottom:10px;padding-bottom:8px;border-bottom:0.5px dashed var(--border);}
  .sched-row-wrap:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
  .sched-place-row{display:flex;gap:8px;padding-left:118px;}
  .sched-place-row input{font-family:inherit;font-size:12px;padding:6px 10px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text2);outline:none;flex:1;}
  .sched-place-row input:focus{border-color:var(--blue);}
  .sched-row input[type="time"]{width:110px;font-family:inherit;font-size:13px;padding:7px 10px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
  .sched-row input[type="text"]{flex:1;font-family:inherit;font-size:13px;padding:7px 12px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
  .icon-del-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;border-radius:50%;display:flex;}
  .icon-del-btn:hover{color:#c0392b;}
  .add-row-btn{background:none;border:1px dashed var(--border2);border-radius:8px;color:var(--text2);font-size:12px;padding:6px 12px;cursor:pointer;font-family:inherit;width:100%;margin-top:4px;}
  .add-row-btn:hover{border-color:var(--blue);color:var(--blue);}
  .add-day-btn{background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--radius);color:var(--text2);font-size:13px;padding:12px;cursor:pointer;font-family:inherit;width:100%;}
  .add-day-btn:hover{border-color:var(--blue);color:var(--blue);}

  /* 가계부 탭 */
  .exchange-rate-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;align-items:end;margin-bottom:16px;padding:12px;background:var(--bg2);border-radius:10px;}
  .exchange-rate-row label{font-size:11px;color:var(--text2);grid-row:1;}
  .exchange-rate-row input{font-family:inherit;font-size:13px;padding:7px 10px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);outline:none;grid-row:2;}
  .exchange-rate-row input:focus{border-color:var(--blue);}
  @media (max-width:600px){ .exchange-rate-row{grid-template-columns:1fr 1fr;} .exchange-rate-row label:nth-child(1),.exchange-rate-row label:nth-child(3){grid-row:auto;} }
  .budget-summary{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;}
  .budget-stat{flex:1;min-width:120px;background:var(--bg2);border-radius:10px;padding:12px;}
  .budget-stat .label{font-size:11px;color:var(--text3);margin-bottom:4px;}
  .budget-stat .value{font-size:17px;font-weight:700;color:var(--blue);}
  .budget-stat .sub-value{font-size:12px;color:var(--text3);margin-top:2px;}
  .expense-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .expense-row select{width:90px;font-family:inherit;font-size:13px;padding:7px 8px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
  .expense-row input[type="text"]{flex:1;font-family:inherit;font-size:13px;padding:7px 12px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
  .expense-row input[type="number"]{width:100px;font-family:inherit;font-size:13px;padding:7px 12px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
  .expense-krw-hint{font-size:11px;color:var(--text3);width:90px;flex-shrink:0;white-space:nowrap;}

  /* 체크리스트 탭 */
  .checklist-section{margin-bottom:18px;}
  .checklist-section h4{font-size:13px;color:var(--text2);margin-bottom:8px;}
  .check-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .check-row input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:var(--blue);}
  .check-row input[type="text"]{flex:1;font-family:inherit;font-size:13px;padding:6px 10px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;}
  .check-row.done input[type="text"]{text-decoration:line-through;color:var(--text3);}

  /* 갤러리 탭 */
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:14px;}
  .gallery-card{border-radius:10px;overflow:hidden;border:0.5px solid var(--border2);position:relative;}
  .gallery-card img{width:100%;height:130px;object-fit:cover;display:block;cursor:zoom-in;}
  .gallery-caption{padding:6px 8px;font-size:12px;}
  .gallery-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.55);border:none;border-radius:50%;width:24px;height:24px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .add-photo-btn{background:var(--bg2);border:1px dashed var(--border2);border-radius:10px;color:var(--text2);font-size:13px;padding:14px;cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;}
  .add-photo-btn:hover{border-color:var(--blue);color:var(--blue);}

  .empty-msg{text-align:center;padding:2rem 1rem;color:var(--text3);font-size:13px;}

  /* 기록 탭 */
  .record-date-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
  .record-date-chip{flex-shrink:0;padding:6px 14px;border-radius:999px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;}
  .record-date-chip.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .record-layout{display:grid;grid-template-columns:1fr 9fr;gap:18px;}
  .record-col{display:flex;flex-direction:column;gap:10px;}
  .record-col-title{font-size:13px;font-weight:700;color:var(--text2);}
  .record-timeline-col{position:relative;padding-left:4px;}
  .timeline-item{position:relative;padding:6px 0 6px 22px;font-size:13px;}
  .timeline-item::before{content:'';position:absolute;left:4px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--blue);}
  .timeline-item::after{content:'';position:absolute;left:7px;top:22px;bottom:-8px;width:2px;background:var(--border2);}
  .timeline-item:last-child::after{display:none;}
  .timeline-time{font-weight:700;color:var(--text2);font-size:12px;}
  .timeline-content{color:var(--text);margin-top:2px;}

  /* 기록 작성창 */
  .record-composer{border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px;margin-bottom:6px;display:flex;flex-direction:column;gap:10px;}
  .record-composer textarea{font-family:inherit;font-size:14px;padding:10px 12px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text);outline:none;resize:vertical;line-height:1.6;}
  .record-composer textarea:focus{border-color:var(--blue);}
  .record-composer-actions{display:flex;justify-content:space-between;align-items:center;}
  .record-composer-left{display:flex;align-items:center;gap:8px;}
  .record-time-inp{font-family:inherit;font-size:13px;color:var(--text2);background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;padding:5px 8px;outline:none;width:90px;}
  .record-time-inp:focus{border-color:var(--blue);}
  #record-pending-photos{grid-template-columns:repeat(4,1fr);}
  #record-pending-photos .gallery-card{position:relative;}

  /* 기록 게시물 피드 */
  .record-post{display:flex;gap:14px;border-top:0.5px solid var(--border);padding:14px 0;}
  .record-post:first-child{border-top:none;}
  .record-post-photos{flex:0 0 40%;display:grid;grid-template-columns:repeat(2,1fr);gap:4px;border-radius:10px;overflow:hidden;align-self:flex-start;}
  .record-post-photos.n1{grid-template-columns:1fr;}
  .record-post-photos img{width:100%;height:90px;object-fit:cover;display:block;cursor:zoom-in;}
  .record-post-photos.n1 img{height:160px;}
  .record-post-body{flex:1;display:flex;flex-direction:column;gap:6px;}
  .record-post-text{font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .record-post-meta{display:flex;justify-content:space-between;align-items:center;}
  .record-post-time-inp{font-family:inherit;font-size:11px;color:var(--text3);background:transparent;border:none;outline:none;cursor:pointer;padding:2px 0;}
  .record-post-time-inp:focus{color:var(--blue);}
  .record-post-time{font-size:11px;color:var(--text3);}
  .record-post-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:3px;}
  .record-post-del:hover{color:#c0392b;}
  @media (max-width:680px){ .record-layout{grid-template-columns:1fr;} .record-post-photos{flex:0 0 100px;} }

  /* 라이트박스 */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .lightbox.show{opacity:1;pointer-events:all;}
  .lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;}
  .lb-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:999px;font-size:13px;opacity:0;transition:all 0.25s ease;pointer-events:none;z-index:999;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">

  <!-- 토큰 화면 -->
  <div class="token-screen" id="token-screen">
    <h2>✈️ 여행 기록</h2>
    <p>GitHub에 여행 데이터를 저장합니다.<br>토큰을 한 번만 입력하면 이 기기에 저장돼요.</p>
    <input class="gh-field" id="gh-owner" placeholder="GitHub 사용자명" autocomplete="off">
    <input class="gh-field" id="gh-repo" placeholder="저장소 이름 (예: diary-data)" autocomplete="off">
    <input class="token-input" id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx" autocomplete="off">
    <button class="token-btn" id="token-btn">저장하고 시작하기</button>
  </div>

  <!-- 메인 화면 -->
  <div class="main-screen" id="main-screen">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-msg">불러오는 중...</span>
    </div>

    <!-- 여행 목록 화면 -->
    <div class="list-screen" id="list-screen">
      <div class="list-header">
        <div class="list-title">✈️ 내 여행</div>
        <button class="new-trip-btn" id="new-trip-btn"><i class="ti ti-plus"></i> 새 여행</button>
      </div>
      <div class="trip-grid" id="trip-grid"></div>
      <div class="empty-trips" id="empty-trips" style="display:none;">아직 만든 여행이 없어요. 새 여행을 만들어보세요!</div>
    </div>

    <!-- 여행 상세 화면 -->
    <div class="detail-screen" id="detail-screen">
      <div class="detail-header">
        <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i></button>
        <div class="detail-title" id="detail-title">여행 이름</div>
        <button class="delete-trip-btn" id="delete-trip-btn"><i class="ti ti-trash"></i></button>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" data-tab="overview"><i class="ti ti-info-circle"></i> 개요</button>
        <button class="tab-btn" data-tab="schedule"><i class="ti ti-calendar"></i> 일정</button>
        <button class="tab-btn" data-tab="record"><i class="ti ti-camera"></i> 기록</button>
        <button class="tab-btn" data-tab="budget"><i class="ti ti-currency-dollar"></i> 가계부</button>
        <button class="tab-btn" data-tab="checklist"><i class="ti ti-checklist"></i> 체크리스트</button>
      </div>

      <!-- 개요 탭 -->
      <div class="tab-content active" id="tab-overview">
        <div class="field-row">
          <label>여행 이름</label>
          <input type="text" id="ov-name">
        </div>
        <div class="field-row">
          <label>여행지</label>
          <input type="text" id="ov-destination">
        </div>
        <div class="field-2col">
          <div class="field-row">
            <label>시작일</label>
            <input type="date" id="ov-start">
          </div>
          <div class="field-row">
            <label>종료일</label>
            <input type="date" id="ov-end">
          </div>
        </div>
        <div class="field-2col">
          <div class="field-row">
            <label>동행</label>
            <input type="text" id="ov-companions" placeholder="예: 가족, 친구">
          </div>
          <div class="field-row">
            <label>예산</label>
            <input type="number" id="ov-budget" placeholder="원">
          </div>
        </div>
        <div class="field-row">
          <label>상태</label>
          <select id="ov-status">
            <option value="예정">예정</option>
            <option value="진행중">진행중</option>
            <option value="완료">완료</option>
          </select>
        </div>
        <div class="field-row">
          <label>커버 사진 URL</label>
          <input type="text" id="ov-cover" placeholder="https://...">
        </div>
        <div class="field-row">
          <label>메모</label>
          <textarea id="ov-memo" rows="3"></textarea>
        </div>
        <button class="save-btn" id="ov-save-btn">저장</button>
      </div>

      <!-- 일정 탭 -->
      <div class="tab-content" id="tab-schedule">
        <div id="schedule-days"></div>
        <button class="add-day-btn" id="add-day-btn"><i class="ti ti-plus"></i> 날짜 추가</button>
      </div>

      <!-- 가계부 탭 -->
      <div class="tab-content" id="tab-budget">
        <div class="exchange-rate-row">
          <label>현지 화폐 단위 (예: JPY, 엔)</label>
          <input type="text" id="budget-currency" placeholder="예: 엔">
          <label>환율 (현지화폐 1단위 = 원)</label>
          <input type="number" id="budget-rate" placeholder="예: 9.5" step="0.01">
        </div>
        <div class="budget-summary" id="budget-summary"></div>
        <div id="expense-rows"></div>
        <button class="add-row-btn" id="add-expense-btn"><i class="ti ti-plus"></i> 지출 추가</button>
      </div>

      <!-- 체크리스트 탭 -->
      <div class="tab-content" id="tab-checklist">
        <div class="checklist-section">
          <h4>🧳 짐싸기</h4>
          <div id="check-packing"></div>
          <button class="add-row-btn" data-section="packing">+ 항목 추가</button>
        </div>
        <div class="checklist-section">
          <h4>📋 예약 확인</h4>
          <div id="check-booking"></div>
          <button class="add-row-btn" data-section="booking">+ 항목 추가</button>
        </div>
        <div class="checklist-section">
          <h4>🚪 출발 전</h4>
          <div id="check-before"></div>
          <button class="add-row-btn" data-section="before">+ 항목 추가</button>
        </div>
      </div>

      <!-- 기록 탭 -->
      <div class="tab-content" id="tab-record">
        <div class="record-date-bar" id="record-date-bar"></div>
        <div class="record-layout" id="record-layout" style="display:none;">
          <div class="record-col record-timeline-col">
            <h4 class="record-col-title">일정</h4>
            <div id="record-timeline"></div>
          </div>
          <div class="record-col record-feed-col">
            <h4 class="record-col-title">일기</h4>

            <div class="record-composer">
              <div class="gallery-grid" id="record-pending-photos" style="display:none;"></div>
              <input type="file" id="record-file-input" accept="image/*" multiple style="display:none;">
              <textarea id="record-diary-input" rows="3" placeholder="오늘의 기록 남기기🩶"></textarea>
              <div class="record-composer-actions">
                <div class="record-composer-left">
                  <button class="icon-del-btn" id="record-add-photo-btn" title="사진 추가" style="color:var(--blue);"><i class="ti ti-photo" style="font-size:20px;"></i></button>
                  <input type="time" id="record-time-input" class="record-time-inp">
                </div>
                <button class="save-btn" id="record-diary-save-btn">올리기</button>
              </div>
            </div>

            <div id="record-posts-list"></div>
          </div>
        </div>
        <div class="empty-msg" id="record-empty-msg">먼저 일정 탭에서 날짜를 추가해주세요.</div>
      </div>
    </div>
  </div>

  <!-- 새 여행 모달 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <h3>새 여행 만들기</h3>
      <div class="modal-field">
        <label>여행 이름</label>
        <input type="text" id="modal-trip-name" placeholder="예: 제주도 여행">
      </div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modal-cancel">취소</button>
        <button class="modal-btn confirm" id="modal-confirm">만들기</button>
      </div>
    </div>
  </div>

</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close"><i class="ti ti-x"></i></button>
  <img id="lb-img" src="" alt="">
</div>
<div class="toast" id="toast"></div>

<script src="travel-app.js"></script>
</body>
</html>
